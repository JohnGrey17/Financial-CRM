databaseChangeLog:
  - changeSet:
      id: create-departments-table
      author: serj

      changes:

        - createTable:
            tableName: departments

            columns:

              - column:
                  name: id
                  type: BIGSERIAL

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false