databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: serj

      changes:

        - createTable:
            tableName: payments

            columns:

              - column:
                  name: id
                  type: BIGSERIAL

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(15,2)

                  constraints:
                    nullable: false

              - column:
                  name: payment_date
                  type: DATE

                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(100)

                  constraints:
                    nullable: false

              - column:
                  name: project_id
                  type: BIGINT

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: project_id

            referencedTableName: projects
            referencedColumnNames: id

            constraintName: fk_payment_project