databaseChangeLog:
  - changeSet:
      id: create-projects-table
      author: serj

      changes:

        - createTable:
            tableName: projects

            columns:

              - column:
                  name: id
                  type: BIGSERIAL

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: division_id
                  type: BIGINT

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: division_id

            referencedTableName: divisions
            referencedColumnNames: id

            constraintName: fk_project_division