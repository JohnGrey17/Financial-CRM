databaseChangeLog:
  - changeSet:
      id: create-divisions-table
      author: serj

      changes:

        - createTable:
            tableName: divisions

            columns:

              - column:
                  name: id
                  type: BIGSERIAL

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: department_id
                  type: BIGINT

                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP

                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: divisions
            baseColumnNames: department_id

            referencedTableName: departments
            referencedColumnNames: id

            constraintName: fk_division_department