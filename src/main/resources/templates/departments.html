<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Departments</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h3 class="mb-3">Створити департамент</h3>

            <form th:action="@{/departments}" th:object="${department}" method="post">
                <div class="mb-3">
                    <label class="form-label">Назва департаменту</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Наприклад: IT департамент">
                </div>

                <button type="submit" class="btn btn-primary">
                    Зберегти
                </button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-3">Департаменти</h3>

            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Назва</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="department : ${departments}">
                    <td th:text="${department.id}">1</td>
                    <td th:text="${department.name}">IT департамент</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
